# Print the stack trace of configuration errors for development purposes
debug: false

# Whether to show config errors in chat when a player uses /castlegates reload
show-reload-errors: true

# Whether to use colors in console messages
colored-console: true

# Generates example files
generate-examples: true

# Checks for available updates on startup and on reload
check-for-updates: true

# Enables bStats metrics collection (https://bstats.org/plugin/bukkit/CastleGates/24502)
metrics: true   # Keep this on if you want to support development. (No performance impact)

# Dumps the giant CastleGates logo in console on startup and on reload
dump-logo: true

# The language file that should be used (en = en.yml)
language: en

# The auto save timer, if not set or set to 0 data will only be saved on shutdown or on /castlegates reload
auto-save: 0

# The time to wait for other plugins to finish loading their worlds after server startup is complete.
# Increase if you notice CastleGates is not detecting your custom worlds.
world-load-timeout: 3s

# How long to keep player data after they leave the server.
# Avoids players quitting and joining back to reset their flags.
player-cache-duration: 30s

# Blocks that should be ignored when using /castlegates structure save <file-name>
structure-blacklist:
  - AIR
  - BEDROCK

# The wand used to select a region (admin tool)
structure-wand:
  material: diamond pickaxe
  name: '&6&lCastleGates Wand'
  glow: true
  lore:
    - '&fleft-click to select first corner'
    - '&fright-click to select second corner'

# The gate item used to place and break gates (admin tool)
gate-tool:
  material: terracotta   # Replaced by the last phase block
  name: '&b&l{gate_tc} Gate ({gate_tool_rotation_tc})'
  glow: true
  lore:
    - '&fright-click to place'
    - '&fleft-click to break'
    - '&fshift + left-click (air) to rotate'

