sendResourceInfo:
  do:
    - "chatMessage <--- &b&l%gate_tc% Resource &f--->"
    - "chatMessage <&bState: &f%gate_state_tc%>"
    - "chatMessage <&bProgress: &f%gate_stage%/%gate_stages%>"
    - "chatMessage <&bTime Left: &f%gate_growth_seconds%s>"

requireHarvestPermission:
  if-not: hasPermission castlegates.gate.harvest
  do:
    - chatMessage <&4You don't have the permission to harvest this resource>
    - cancelEvent
    - stop

requireSpecialTool:
  if-any:
    - toolTypeEquals gold_pickaxe, diamond_pickaxe
    - toolIsSimilar iron_ingot, diamond
    - toolHasCustomModel 000001, 000002
  else:
    - chatMessage <&4You need a special tool to mine this block>
    - cancelEvent
    - stop